<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --primary-color: #3b69dc;
        --secondary-color: #233f86;
      }
      
      @keyframes rotate-inner {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes rotate-second {
        from { transform: rotate(52.5deg); }
        to { transform: rotate(412.5deg); }
      }
      
      @keyframes rotate-third {
        from { transform: rotate(137.5deg); }
        to { transform: rotate(497.5deg); }
      }
      
      @keyframes rotate-outer {
        from { transform: rotate(275deg); }
        to { transform: rotate(635deg); }
      }
      
      .circle-inner, .circle-second, .circle-third, .circle-outer {
        transform-origin: 150px 150px;
      }
      
      .circle-inner {
        animation: rotate-inner 60s linear infinite; /* 1 minute rotation */
      }
      
      .circle-second {
        animation: rotate-second 37.1s linear infinite; /* 60s / 1.618 ≈ 37.1s */
      }
      
      .circle-third {
        animation: rotate-third 22.9s linear infinite; /* 37.1s / 1.618 ≈ 22.9s */
      }
      
      .circle-outer {
        animation: rotate-outer 14.1s linear infinite; /* 22.9s / 1.618 ≈ 14.1s */
      }
    </style>
    <linearGradient id="linearGradient0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:var(--primary-color);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--secondary-color);stop-opacity:1" />
    </linearGradient>
  </defs>

  <g>
    <circle class="circle-outer" cx="150" cy="150" r="120" fill="url(#linearGradient0)" />
    <circle class="circle-third" cx="150" cy="150" r="90" fill="url(#linearGradient0)" />
    <circle class="circle-second" cx="150" cy="150" r="60" fill="url(#linearGradient0)" />
    <circle class="circle-inner" cx="150" cy="150" r="30" fill="url(#linearGradient0)" />
  </g>
</svg>